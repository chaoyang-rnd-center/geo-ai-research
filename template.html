<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <style>
        :root {
            --font-serif: 'Merriweather', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --color-text: #292929;
            --color-text-secondary: #757575;
            --color-border: #e6e6e6;
            --color-bg: #fff;
            --color-bg-secondary: #f7f7f7;
            --color-accent: #1a8917;
            --color-accent-hover: #0f730c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-serif);
            font-size: 18px;
            line-height: 1.8;
            color: var(--color-text);
            background: var(--color-bg);
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
            z-index: 1000;
            height: 60px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 20px;
            color: var(--color-text);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--color-text);
        }

        .nav-links a.active {
            color: var(--color-accent);
        }

        /* Mobile menu */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .nav-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--color-text);
            margin: 5px 0;
            transition: 0.3s;
        }

        /* Main content */
        .main {
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }

        .article {
            max-width: 680px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Article header */
        .article-header {
            margin-bottom: 48px;
        }

        .article-title {
            font-family: var(--font-sans);
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }

        .article-meta {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        /* Typography */
        .article-content h2 {
            font-family: var(--font-sans);
            font-size: 28px;
            font-weight: 700;
            margin-top: 48px;
            margin-bottom: 24px;
            line-height: 1.3;
        }

        .article-content h3 {
            font-family: var(--font-sans);
            font-size: 22px;
            font-weight: 600;
            margin-top: 36px;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .article-content h4 {
            font-family: var(--font-sans);
            font-size: 18px;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 12px;
        }

        .article-content p {
            margin-bottom: 24px;
        }

        .article-content ul,
        .article-content ol {
            margin-bottom: 24px;
            padding-left: 32px;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .article-content strong {
            font-weight: 700;
        }

        .article-content em {
            font-style: italic;
        }

        /* Links */
        .article-content a {
            color: var(--color-accent);
            text-decoration: underline;
            text-decoration-color: var(--color-accent);
            text-underline-offset: 2px;
        }

        .article-content a:hover {
            color: var(--color-accent-hover);
        }

        /* Blockquotes */
        .article-content blockquote {
            border-left: 3px solid var(--color-text);
            padding-left: 24px;
            margin: 32px 0;
            font-style: italic;
            color: var(--color-text-secondary);
        }

        /* Tables */
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 32px 0;
            font-family: var(--font-sans);
            font-size: 15px;
        }

        .article-content th,
        .article-content td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }

        .article-content th {
            font-weight: 600;
            background: var(--color-bg-secondary);
        }

        .article-content tr:hover {
            background: var(--color-bg-secondary);
        }

        /* Code blocks */
        .article-content pre {
            background: var(--color-bg-secondary);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 24px 0;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .article-content code {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.85em;
            background: var(--color-bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .article-content pre code {
            background: none;
            padding: 0;
        }

        /* Horizontal rule */
        .article-content hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 48px 0;
        }

        /* Highlight boxes */
        .article-content .highlight-box {
            background: var(--color-bg-secondary);
            border-left: 4px solid var(--color-accent);
            padding: 20px 24px;
            margin: 32px 0;
            border-radius: 0 8px 8px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                background: var(--color-bg);
                flex-direction: column;
                padding: 16px 24px;
                border-bottom: 1px solid var(--color-border);
                gap: 16px;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-toggle {
                display: block;
            }

            .article {
                padding: 32px 20px;
            }

            .article-title {
                font-size: 32px;
            }

            .article-content h2 {
                font-size: 24px;
            }

            .article-content h3 {
                font-size: 20px;
            }

            body {
                font-size: 16px;
            }

            .article-content table {
                font-size: 13px;
            }

            .article-content th,
            .article-content td {
                padding: 8px 12px;
            }
        }

        /* Print styles */
        @media print {
            .nav {
                display: none;
            }

            .main {
                margin-top: 0;
            }

            .article {
                max-width: 100%;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">AI 产品深度分析</a>
            <button class="nav-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="phase1-perplexity-computer.html">Perplexity</a></li>
                <li><a href="phase1-claude-cowork.html">Claude</a></li>
                <li><a href="phase1-tencent-workbuddy.html">WorkBuddy</a></li>
                <li><a href="phase1-github-copilot.html">Copilot</a></li>
                <li><a href="phase1-cursor.html">Cursor</a></li>
                <li><a href="phase1-devin.html">Devin</a></li>
            </ul>
        </div>
    </nav>

    <main class="main">
        <article class="article">
            <header class="article-header">
                <h1 class="article-title">{{title}}</h1>
                <div class="article-meta">
                    {{meta}}
                </div>
            </header>
            <div class="article-content">
                {{content}}
            </div>
        </article>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        // Highlight current page in navigation
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-links a').forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            }
        });

        // Initialize syntax highlighting
        document.addEventListener('DOMContentLoaded', function() {
            hljs.highlightAll();
        });
    </script>
</body>
</html>
